name: Build Windows installer

# Manually triggered: builds the NSIS installer on a real Windows runner
# (electron-builder needs Windows/Wine for rcedit; this avoids cross-build
# flakiness on macOS) and uploads it to an existing release as
# GodFirst-Setup.exe — the version-less name the landing page links to.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to attach the installer to (e.g. v0.1.2)'
        required: true
        default: 'v0.1.2'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build bundles
        run: npm run build

      - name: Package Windows installer (NSIS)
        run: npx electron-builder --win --publish never

      - name: Normalize installer name
        shell: bash
        run: |
          set -e
          ls -la release
          # NSIS default output is "GodFirst Setup <version>.exe"; the landing
          # page links to the version-less GodFirst-Setup.exe.
          exe=$(ls release/*Setup*.exe | head -n1)
          cp "$exe" "release/GodFirst-Setup.exe"
          ls -la release/GodFirst-Setup.exe

      - name: Upload to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.inputs.tag }}" \
            "release/GodFirst-Setup.exe" --clobber
