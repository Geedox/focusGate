# GodFirst packaging. Produces:
#   macOS:   release/GodFirst-<version>-arm64.dmg   (`npx electron-builder --mac`)
#   Windows: release/GodFirst Setup <version>.exe   (`npx electron-builder --win`, NSIS)
#
# Icons are derived from build/icon.png (generated by scripts/generate-app-icon.mjs).
appId: com.godfirst.app
productName: GodFirst
directories:
  output: release
  buildResources: build
files:
  - out/**
  - package.json
extraResources:
  - from: resources
    to: resources

mac:
  category: public.app-category.productivity
  # universal = one .app containing both Intel (x64) and Apple Silicon
  # (arm64) binaries — a single DMG works on every Mac.
  target:
    - target: dmg
      arch: [universal]
  extendInfo:
    # Tray-only app: no Dock icon, no Cmd+Tab entry (runtime dock.hide() is
    # the fallback in dev).
    LSUIElement: true
    # Required for the reading-presence check: macOS TERMINATES an app that
    # accesses the camera without this string.
    NSCameraUsageDescription: >-
      GodFirst uses your camera during a reading session only, to check a
      person is present. Detection runs entirely on this device; no video is
      recorded or transmitted.
  # --- CODE SIGNING (macOS) ------------------------------------------------
  # Unsigned builds trigger Gatekeeper warnings. To sign & notarize:
  #  1. Join the Apple Developer Program ($99/yr) and create a
  #     "Developer ID Application" certificate in Keychain.
  #  2. Replace the line below with your identity, e.g.:
  #       identity: "Developer ID Application: Your Name (TEAMID1234)"
  #  3. For notarization, export APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD /
  #     APPLE_TEAM_ID and add:  notarize: true
  identity: null

win:
  # One installer containing BOTH 64-bit and 32-bit Windows builds; NSIS
  # detects the machine and installs the right one.
  target:
    - target: nsis
      arch: [x64, ia32]
  # --- CODE SIGNING (Windows) ----------------------------------------------
  # Unsigned installers trigger SmartScreen. Once you have a code-signing
  # certificate (OV/EV), configure e.g.:
  #   signtoolOptions:
  #     certificateFile: path/to/cert.pfx
  #     certificatePassword: ${env.WIN_CSC_PASSWORD}

nsis:
  oneClick: true
  # Autostart is registered by the app itself on first run
  # (app.setLoginItemSettings), not by the installer.
  runAfterFinish: true
  deleteAppDataOnUninstall: false
