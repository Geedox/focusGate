<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- No remote origins anywhere: gfres: is the app's own local-asset
         scheme (MediaPipe wasm + face model); wasm-unsafe-eval is required
         to instantiate that WebAssembly; ws://localhost is Vite dev HMR. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval' gfres:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self' blob:; connect-src 'self' gfres: ws://localhost:*; worker-src 'self' blob:"
    />
    <title>GodFirst</title>
  </head>
  <body class="bg-neutral-950 text-neutral-100">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
